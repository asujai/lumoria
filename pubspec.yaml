name: context_pdf
description: Bağlamsal Metin İşleme ve Arşivleme
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  syncfusion_flutter_pdfviewer: ^32.2.7
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_secure_storage: ^9.0.0
  google_generative_ai: ^0.2.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.2
  envied: ^1.3.3
  file_picker: ^10.3.10
  http: ^1.6.0
  google_fonts: ^8.0.2
  easy_localization: ^3.0.8
  flutter_markdown: ^0.7.7+1
  sqflite_common_ffi: ^2.4.0+2
  path_provider: ^2.1.5
  dio: ^5.9.2
  crypto: ^3.0.7
  supabase_flutter: ^2.12.0
  purchases_flutter: ^9.12.3
  url_launcher: ^6.3.2
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  envied_generator: ^1.3.3
  build_runner: ^2.11.1
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1B1A22"
  image: "assets/images/app_icon.png"
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/translations/
  #   - images/a_dot_burr.jpegr
